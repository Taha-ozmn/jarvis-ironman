jarvis:
  name: J.A.R.V.I.S.
  user_name: sir
  formal_address: true
  persona: iron_man
  language: tr-TR
  voice: en-GB-RyanNeural
  wake_words:
    - jarvis
    - hey jarvis
    - ok jarvis
  model: auto
  think_timeout: 60
  complex_timeout: 480
  deep_timeout: 900
  background_on_timeout: true
  fast_mode: true
  narrate: true
  work_updates: false
  ai_only: true
  workspace: "/Users/mac/Desktop/Projeler/jarvis-ironman"
  full_access: true
  sandbox: false
  auto_review: false
  setting_sources: all
  max_speech_chars: 220
  fast_boot: true
  skip_model_list: true
  boot_delay: 0.08

voice:
  engine: jarvis
  cinematic: true
  native_voice: Daniel
  native_rate: 145
  edge_timeout: 8
  listen_language: tr-TR
  listen_timeout: 5
  phrase_limit: 8
  energy_threshold: 450
  pause_threshold: 0.9
  ambient_calibration_seconds: 1.2
  speech_rate: "-15%"

ui:
  enabled: true
  mode: browser
  port: 8765
  window_width: 1280
  window_height: 820
  telemetry_interval: 2
  always_listen: true
  require_wake_word: false
  min_confidence: 0.55
  pause_while_busy: true
  min_command_length: 3

system:
  full_shell_access: true
  allowed_apps:
    - Spotify
    - Chrome
    - Safari
    - Cursor
    - Terminal
    - Finder
    - Notes
    - Music
    - Slack
    - Discord

boot:
  music_enabled: false
  music:
    player: music
    title: Back in Black
    artist: AC/DC
